name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: elms_test
          POSTGRES_USER: elms_user
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Django system checks
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-only
          DEBUG: "True"
          DB_NAME: elms_test
          DB_USER: elms_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: "5432"
          REDIS_URL: redis://localhost:6379
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python manage.py check

      - name: Run migrations
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-only
          DEBUG: "True"
          DB_NAME: elms_test
          DB_USER: elms_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: "5432"
          REDIS_URL: redis://localhost:6379
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python manage.py migrate --no-input

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-only
          DEBUG: "True"
          DB_NAME: elms_test
          DB_USER: elms_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: "5432"
          REDIS_URL: redis://localhost:6379
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python manage.py test --verbosity=2

  # ── Frontend Build ─────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://placeholder.example.com/api
          VITE_WS_URL: wss://placeholder.example.com
        run: npm run build

  # ── Deploy (main branch only) ──────────────────────────────
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key:      ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /opt/elms
            git pull origin main
            docker compose pull
            docker compose up -d --build
            docker compose exec -T backend python manage.py migrate --no-input
            docker compose exec -T backend python manage.py collectstatic --no-input --clear
